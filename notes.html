<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notes — PrepShot</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#060810;--card:#0d1019;--border:rgba(255,255,255,0.07);--accent:#6366f1;--accent2:#818cf8;--accent3:#a78bfa;--text:#eef2ff;--muted:#7c85a2;}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Space Grotesk',sans-serif;min-height:100vh}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(ellipse 80% 50% at 20% -10%,rgba(99,102,241,0.18) 0%,transparent 55%),radial-gradient(ellipse 60% 45% at 80% 110%,rgba(167,139,250,0.12) 0%,transparent 50%)}
nav{position:sticky;top:0;z-index:100;background:rgba(8,11,18,0.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 24px;height:60px;display:flex;align-items:center;gap:16px}
.logo{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;background:linear-gradient(135deg,#818cf8,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-decoration:none}
.nav-search{flex:1;max-width:440px;display:flex;align-items:center;background:rgba(20,24,32,0.8);border:1px solid rgba(99,102,241,0.2);border-radius:50px;padding:0 16px;height:38px;gap:8px}
.nav-search input{flex:1;background:none;border:none;outline:none;color:var(--text);font-family:inherit;font-size:14px}
.nav-links{margin-left:auto;display:flex;align-items:center;gap:4px}
.nav-link{display:flex;align-items:center;gap:6px;color:var(--muted);font-size:13px;font-weight:500;padding:7px 14px;border-radius:50px;text-decoration:none;transition:all 0.2s}
.nav-link:hover{color:var(--text);background:rgba(255,255,255,0.05)}
.nav-link.active{color:var(--accent2);background:rgba(99,102,241,0.12);border:1px solid rgba(99,102,241,0.25)}
.page{position:relative;z-index:1;max-width:960px;margin:0 auto;padding:32px 24px 60px}
.back-link{display:inline-flex;align-items:center;gap:6px;color:var(--muted);font-size:13px;text-decoration:none;margin-bottom:20px}
.back-link:hover{color:var(--text)}
.page-title{font-family:'Syne',sans-serif;font-size:clamp(24px,4vw,36px);font-weight:800;margin-bottom:6px}
.page-title span{color:var(--accent2)}
.page-sub{color:var(--muted);font-size:14px;margin-bottom:24px}
.note-search-wrap{display:flex;align-items:center;gap:10px;background:rgba(13,16,25,0.8);border:1px solid rgba(99,102,241,0.2);border-radius:10px;padding:0 14px;height:44px;margin-bottom:20px;transition:border-color 0.2s}
.note-search-wrap:focus-within{border-color:rgba(99,102,241,0.5)}
.note-search-wrap input{flex:1;background:none;border:none;outline:none;color:var(--text);font-family:inherit;font-size:14px}
.subject-tabs{display:flex;gap:0;border-bottom:2px solid rgba(255,255,255,0.06);margin-bottom:0;overflow-x:auto;scrollbar-width:none}
.subject-tabs::-webkit-scrollbar{display:none}
.tab-btn{padding:13px 26px;font-size:14px;font-weight:500;color:var(--muted);background:none;border:none;border-bottom:2px solid transparent;margin-bottom:-2px;cursor:pointer;white-space:nowrap;transition:all 0.2s;font-family:inherit}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{color:var(--accent2);border-bottom-color:var(--accent2);font-weight:600}
.notes-list{display:flex;flex-direction:column;margin-top:4px}
.note-row{display:flex;align-items:center;gap:14px;padding:15px 6px;border-bottom:1px solid rgba(255,255,255,0.05);transition:background 0.15s}
.note-row:last-child{border-bottom:none}
.note-row:hover{background:rgba(99,102,241,0.04);border-radius:8px;padding-left:10px}
.note-title{flex:1;font-size:15px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.note-chapter{font-size:12px;color:var(--muted);flex-shrink:0;white-space:nowrap}
.btn-dl{display:flex;align-items:center;gap:6px;padding:7px 18px;border-radius:8px;border:1px solid rgba(99,102,241,0.35);background:rgba(99,102,241,0.07);color:var(--accent2);font-size:13px;font-weight:600;text-decoration:none;white-space:nowrap;transition:background 0.2s;flex-shrink:0}
.btn-dl:hover{background:rgba(99,102,241,0.18)}
.state-msg{text-align:center;padding:48px 20px;color:var(--muted);font-size:14px}
.state-icon{font-size:36px;margin-bottom:12px}
.ps-footer{margin-top:40px;border-top:1px solid var(--border);padding:32px 24px 20px;position:relative;z-index:1}
.ps-footer-inner{max-width:960px;margin:0 auto;display:flex;flex-wrap:wrap;gap:28px;justify-content:space-between}
.ps-footer-logo{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;background:linear-gradient(135deg,#818cf8,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-decoration:none;display:block;margin-bottom:4px}
.ps-footer-links h4{font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
.ps-footer-links ul{list-style:none;display:flex;flex-direction:column;gap:7px}
.ps-footer-links a{color:var(--text);text-decoration:none;font-size:13px;opacity:0.65}
.ps-footer-links a:hover{opacity:1;color:var(--accent2)}
.ps-footer-bottom{max-width:960px;margin:20px auto 0;padding-top:16px;border-top:1px solid var(--border);font-size:12px;color:var(--muted)}
@media(max-width:600px){nav{padding:0 12px;gap:8px}.nav-link span.lbl{display:none}.page{padding:20px 14px 40px}.tab-btn{padding:10px 16px;font-size:13px}.note-chapter{display:none}.btn-dl{padding:7px 12px;font-size:12px}}
</style>
</head>
<body>
<nav>
  <a class="logo" href="index.html">PrepShot</a>
  <div class="nav-search"><span style="color:var(--muted)">🔍</span><input type="text" placeholder="Lecture dhundho..." /></div>
  <div class="nav-links">
    <a class="nav-link" href="index.html">🏠 <span class="lbl">Home</span></a>
    <a class="nav-link active" href="notes.html">📘 <span class="lbl">Notes</span></a>
    <a class="nav-link" href="about.html">ℹ️ <span class="lbl">About</span></a>
  </div>
</nav>
 
<div class="page">
  <a class="back-link" href="notes.html">← Back to Notes</a>
  <h1 class="page-title"><span id="classTitle"></span> Notes</h1>
  <p class="page-sub" id="classSub"></p>
  <div class="note-search-wrap">
    <span style="color:var(--muted)">🔍</span>
    <input type="text" id="noteSearch" placeholder="Search notes..." oninput="renderNotes()" />
  </div>
  <div class="subject-tabs" id="subjectTabs"></div>
  <div class="notes-list" id="notesList">
    <div class="state-msg"><div class="state-icon">⏳</div>Loading...</div>
  </div>
</div>
 
<footer class="ps-footer">
  <div class="ps-footer-inner">
    <div>
      <a class="ps-footer-logo" href="index.html">PrepShot</a>
      <p style="color:var(--muted);font-size:13px;font-style:italic">Prep Smart. Crack Fast.</p>
    </div>
    <div class="ps-footer-links">
      <h4>Quick Links</h4>
      <ul>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html">Contact</a></li>
        <li><a href="privacy.html">Privacy Policy</a></li>
        <li><a href="terms.html">Terms & Conditions</a></li>
      </ul>
    </div>
  </div>
  <div class="ps-footer-bottom">© 2026 PrepShot. All rights reserved.</div>
</footer>
 
<script>
const CLASS_DESC={
  'Class 9':'Class 9 ke liye sabse acche notes.',
  'Class 10':'Class 10 board exam ke liye curated notes.',
  'Class 11':'Class 11 ke sabhi subjects ke premium notes.',
  'Class 12':'Class 12 board & entrance ke liye top notes.',
  'JEE':'JEE Mains & Advanced ke liye expert notes.',
  'NEET':'NEET preparation ke liye curated notes.',
};
 
const params=new URLSearchParams(window.location.search);
const className=params.get('class')||'JEE';
let allNotes=[], subjects=[], activeSub='';
 
document.title=className+' Notes — PrepShot';
document.getElementById('classTitle').textContent=className;
document.getElementById('classSub').textContent=CLASS_DESC[className]||className+' ke liye notes.';
 
async function init(){
  try{
    const r=await fetch('db.json?t='+Date.now());
    const data=await r.json();
    allNotes=(data.notes||[]).filter(n=>n.class_name===className).sort((a,b)=>(a.chapter_num||0)-(b.chapter_num||0));
    const subSet=new Set(allNotes.map(n=>n.subject));
    subjects=[...(data.note_subjects||[]).filter(s=>s.class_name===className).map(s=>s.name).filter(s=>subSet.has(s))];
    if(!subjects.length) subjects=[...subSet];
  }catch(e){allNotes=[];subjects=[];}
  renderTabs();
  if(subjects.length) selectTab(subjects[0]);
  else document.getElementById('notesList').innerHTML='<div class="state-msg"><div class="state-icon">📭</div>Is class ke liye notes nahi hain abhi.</div>';
}
 
function renderTabs(){
  const el=document.getElementById('subjectTabs');
  if(!subjects.length){el.innerHTML='';return;}
  el.innerHTML=subjects.map(s=>`<button class="tab-btn" id="tab-${CSS.escape(s)}" onclick="selectTab('${s}')">${s}</button>`).join('');
}
 
function selectTab(sub){
  activeSub=sub;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  const btn=document.getElementById('tab-'+CSS.escape(sub));
  if(btn) btn.classList.add('active');
  document.getElementById('noteSearch').value='';
  renderNotes();
}
 
function renderNotes(){
  const q=document.getElementById('noteSearch').value.toLowerCase().trim();
  const listEl=document.getElementById('notesList');
  let filtered=allNotes.filter(n=>n.subject===activeSub);
  if(q) filtered=filtered.filter(n=>n.title.toLowerCase().includes(q));
  if(!filtered.length){
    listEl.innerHTML=`<div class="state-msg"><div class="state-icon">${q?'🔍':'📭'}</div>${q?`No results for "${q}"`:'Koi notes nahi hain abhi.'}</div>`;
    return;
  }
  listEl.innerHTML=filtered.map(n=>`
    <div class="note-row">
      <div style="font-size:26px;flex-shrink:0">📕</div>
      <div class="note-title">${n.title}</div>
      ${n.chapter_num?`<div class="note-chapter">Ch. ${n.chapter_num}</div>`:''}
      <a class="btn-dl" href="${n.pdf_url}" target="_blank" rel="noopener">Download</a>
    </div>`).join('');
}
init();
</script>
</body>
</html>
